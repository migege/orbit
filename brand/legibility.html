<!doctype html>
<html><head><meta charset="utf-8"><style>
  *{box-sizing:border-box}
  body{margin:0;padding:26px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#e9ecf2;display:flex;gap:22px}
  .panel{border-radius:16px;padding:22px 26px}
  .light{background:#fff;border:1px solid #e3e6eb}
  .dark{background:#16171a}
  .ttl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;margin:0 0 16px}
  .light .ttl{color:#8a9099}.dark .ttl{color:#8b9097}
  table{border-collapse:collapse}
  td{padding:12px 16px;text-align:center;vertical-align:middle}
  th{font-size:11px;color:#9aa1ab;font-weight:600;padding:4px 16px}
  .light th{color:#8a9099}.dark th{color:#8b9097}
  .rl{font-size:12px;font-weight:700;text-align:left;padding-right:18px}
  .light .rl{color:#5b6470}.dark .rl{color:#aeb4bc}
  svg{display:inline-block;vertical-align:middle}
</style></head>
<body>
<div class="panel light"><p class="ttl">Light</p><div id="l"></div></div>
<div class="panel dark"><p class="ttl">Dark</p><div id="d"></div></div>
<script>
const grad=(id)=>`<linearGradient id="${id}" x1="14" y1="12" x2="50" y2="54" gradientUnits="userSpaceOnUse"><stop stop-color="#5b8bff"/><stop offset="1" stop-color="#3370ff"/></linearGradient>`;
const wrap=(g,inner)=>`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none"><defs>${grad(g)}</defs>${inner}</svg>`;
// Original V3
const ORIG=(g)=>wrap(g,`<g transform="rotate(-26 32 32)"><ellipse cx="32" cy="32" rx="27" ry="12" stroke="url(#${g})" stroke-width="3" opacity="0.5"/><circle cx="55.4" cy="26" r="5" fill="url(#${g})"/></g><rect x="21" y="22" width="22" height="20" rx="5" fill="url(#${g})"/><path d="M26 29 L30 32 L26 35" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><line x1="32" y1="35.4" x2="38" y2="35.4" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>`);
// Compact V3: bigger tile, bolder glyphs, stronger orbit
const COMP=(g)=>wrap(g,`<g transform="rotate(-26 32 32)"><ellipse cx="32" cy="32" rx="28" ry="12.5" stroke="url(#${g})" stroke-width="3.4" opacity="0.6"/><circle cx="56" cy="25.6" r="5.4" fill="url(#${g})"/></g><rect x="19" y="20" width="26" height="24" rx="6" fill="url(#${g})"/><path d="M25 27.5 L30 32 L25 36.5" stroke="#fff" stroke-width="2.9" stroke-linecap="round" stroke-linejoin="round"/><line x1="33" y1="35.8" x2="39.5" y2="35.8" stroke="#fff" stroke-width="2.9" stroke-linecap="round"/>`);
let n=0;const uid=()=>'g'+(n++);
const sizes=[16,22,32,48,72];
function tbl(side){
  let head='<tr><th></th>'+sizes.map(s=>`<th>${s}px</th>`).join('')+'</tr>';
  const rows=[['Original',ORIG],['Compact',COMP]].map(([nm,fn])=>{
    return '<tr><td class="rl">'+nm+'</td>'+sizes.map(s=>`<td><span style="width:${s}px;height:${s}px;display:inline-block">${fn(uid()).replace('<svg ',`<svg width="${s}" height="${s}" `)}</span></td>`).join('')+'</tr>';
  }).join('');
  return '<table>'+head+rows+'</table>';
}
document.getElementById('l').innerHTML=tbl('l');
document.getElementById('d').innerHTML=tbl('d');
</script>
</body></html>
