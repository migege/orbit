<!doctype html>
<html><head><meta charset="utf-8"><style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#dfe3ea;padding:30px;display:flex;flex-direction:column;gap:26px}
  .label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#9aa1ab;font-weight:700;margin-bottom:10px}
  .pair{display:flex;gap:22px}
  .pair>div{flex:1}

  /* browser tab */
  .tabwrap{border-radius:12px;overflow:hidden;border:1px solid #d6dae1}
  .tabbar{height:42px;display:flex;align-items:flex-end;padding:0 10px;gap:6px}
  .tabbar.l{background:#cdd2da}.tabbar.d{background:#0e0f11}
  .tab{display:flex;align-items:center;gap:8px;height:34px;padding:0 16px;border-radius:9px 9px 0 0;font-size:13px;font-weight:500}
  .tab.l{background:#fff;color:#2b2f36}.tab.d{background:#1c1d20;color:#e6e8eb}
  .tab svg{width:16px;height:16px;display:block}
  .tabbody{height:60px}.tabbody.l{background:#fff}.tabbody.d{background:#1c1d20}

  /* boot splash */
  .boot{height:230px;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px}
  .boot.l{background:#fff;border:1px solid #e3e6eb}.boot.d{background:#16171a}
  .boot-brand{display:flex;align-items:center;gap:12px}
  .boot-brand svg{width:44px;height:44px;display:block}
  .boot-name{font-size:30px;font-weight:600;letter-spacing:.3px}
  .boot.l .boot-name{color:#1f2329}.boot.d .boot-name{color:#e6e8eb}
  .boot-bar{width:300px;height:6px;border-radius:999px;overflow:hidden}
  .boot.l .boot-bar{background:#f2f3f5}.boot.d .boot-bar{background:#26282d}
  .boot-fill{height:100%;width:62%;border-radius:999px;background:linear-gradient(90deg,#5b8bff,#3370ff)}
  .boot-cap{font-size:13px}.boot.l .boot-cap{color:#8f959e}.boot.d .boot-cap{color:#8b9097}
  .boot-progress{display:flex;flex-direction:column;align-items:center;gap:12px}

  /* sidebar brand row */
  .side{height:64px;border-radius:14px;display:flex;align-items:center;gap:10px;padding:0 18px}
  .side.l{background:#fff;border:1px solid #e3e6eb}.side.d{background:#1a1b1e}
  .side svg{width:22px;height:22px;display:block}
  .side .nm{font-size:18px;font-weight:600}
  .side.l .nm{color:#1f2329}.side.d .nm{color:#e6e8eb}
  .side .car{margin-left:auto;width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px}
  .side.l .car{background:#f4f6fa;color:#9aa1ab}.side.d .car{background:#26282d;color:#8b9097}
</style></head>
<body>
<script>
const MARK = (id,s)=>`<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:${s}px;height:${s}px"><defs><linearGradient id="${id}" x1="14" y1="12" x2="50" y2="54" gradientUnits="userSpaceOnUse"><stop stop-color="#5b8bff"/><stop offset="1" stop-color="#3370ff"/></linearGradient></defs><g transform="rotate(-26 32 32)"><ellipse cx="32" cy="32" rx="28" ry="12.5" stroke="url(#${id})" stroke-width="3.4" opacity="0.6"/><circle cx="56" cy="25.6" r="5.4" fill="url(#${id})"/></g><rect x="19" y="20" width="26" height="24" rx="6" fill="url(#${id})"/><path d="M25 27.5 L30 32 L25 36.5" stroke="#fff" stroke-width="2.9" stroke-linecap="round" stroke-linejoin="round"/><line x1="33" y1="35.8" x2="39.5" y2="35.8" stroke="#fff" stroke-width="2.9" stroke-linecap="round"/></svg>`;
let i=0;const M=s=>MARK('m'+(i++),s);
document.write(`
<div>
  <div class="label">Browser tab · favicon</div>
  <div class="pair">
    <div class="tabwrap"><div class="tabbar l"><div class="tab l">${M(16)}<span>Orbit</span></div></div><div class="tabbody l"></div></div>
    <div class="tabwrap"><div class="tabbar d"><div class="tab d">${M(16)}<span>Orbit</span></div></div><div class="tabbody d"></div></div>
  </div>
</div>
<div>
  <div class="label">App boot splash</div>
  <div class="pair">
    <div class="boot l"><div class="boot-brand">${M(44)}<span class="boot-name">Orbit</span></div><div class="boot-progress"><div class="boot-bar"><div class="boot-fill"></div></div><div class="boot-cap">Loading your workspace…</div></div></div>
    <div class="boot d"><div class="boot-brand">${M(44)}<span class="boot-name">Orbit</span></div><div class="boot-progress"><div class="boot-bar"><div class="boot-fill"></div></div><div class="boot-cap">Loading your workspace…</div></div></div>
  </div>
</div>
<div>
  <div class="label">Sidebar header</div>
  <div class="pair">
    <div class="side l">${M(22)}<span class="nm">Orbit</span><span class="car">‹</span></div>
    <div class="side d">${M(22)}<span class="nm">Orbit</span><span class="car">‹</span></div>
  </div>
</div>
`);
</script>
</body></html>
