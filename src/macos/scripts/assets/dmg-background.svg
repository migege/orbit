<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="800" viewBox="0 0 1320 800">
  <!-- Orbit DMG installer backdrop, 2x (window is 660x400 pt; Retina-crisp on 1320px).
       Finder draws the real icons over the slots: Orbit.app @ (350,380)px, Applications @ (970,380)px.
       Rasterize with: rsvg-convert -w 1320 -h 800 dmg-background.svg -o dmg-background.png
       Brand gradient #5b8bff -> #3370ff matches the app icon / favicon. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eaf1ff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#5b8bff"/>
      <stop offset="1" stop-color="#3370ff"/>
    </linearGradient>
  </defs>

  <!-- base -->
  <rect width="1320" height="800" fill="url(#bg)"/>

  <!-- ambient orbit ring (brand motif), faint so it never competes with the arrow -->
  <g transform="rotate(-24 660 400)">
    <ellipse cx="660" cy="400" rx="610" ry="190" fill="none" stroke="url(#blue)" stroke-width="3" stroke-opacity="0.20"/>
    <circle cx="1270" cy="400" r="10" fill="#3370ff" fill-opacity="0.24"/>
  </g>

  <!-- top: real logo mark (orbit + terminal >_) + wordmark, vertically centered, group-centered at x=660 -->
  <g transform="translate(534,94)">
    <g transform="scale(1.3)">
      <g transform="rotate(-26 32 32)">
        <ellipse cx="32" cy="32" rx="28" ry="12.5" fill="none" stroke="url(#blue)" stroke-width="3.4" stroke-opacity="0.85"/>
        <circle cx="56" cy="25.6" r="5.4" fill="url(#blue)"/>
      </g>
      <rect x="19" y="20" width="26" height="24" rx="6" fill="url(#blue)"/>
      <path d="M25 27.5 L30 32 L25 36.5" fill="none" stroke="#fff" stroke-width="2.9" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="33" y1="35.8" x2="39.5" y2="35.8" stroke="#fff" stroke-width="2.9" stroke-linecap="round"/>
    </g>
    <text x="103" y="58" font-family="DejaVu Sans" font-weight="bold" font-size="48" fill="#27375a">Orbit</text>
  </g>

  <!-- guidance arrow: Orbit -> Applications (rect shaft + triangle head; a bare <line> with an
       objectBoundingBox gradient renders invisible — a horizontal line has zero bbox height) -->
  <rect x="498" y="372" width="282" height="16" rx="8" fill="url(#blue)"/>
  <path d="M772 356 L822 380 L772 404 Z" fill="url(#blue)"/>

  <!-- instruction -->
  <text x="660" y="610" font-family="DejaVu Sans" font-size="33" fill="#3a4a6b" text-anchor="middle">Drag Orbit to Applications</text>
</svg>
