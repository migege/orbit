server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Liveness probe — answered by nginx directly, no upstream needed
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # REST + SSE → control plane (same-origin, so no CORS needed)
    location /api/ {
        proxy_pass http://apiserver:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Server-Sent Events: stream immediately, keep the connection long-lived
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
