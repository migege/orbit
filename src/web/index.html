<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Orbit</title>
    <script>
      // Resolve the theme before first paint so dark users never flash a white
      // screen. Mirrors lib/theme: 'system' follows the OS, else explicit choice.
      (function () {
        try {
          var m = localStorage.getItem('orbit-theme') || 'system';
          var dark =
            m === 'dark' ||
            (m === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        } catch (e) {}
      })();
    </script>
    <style>
      /* First-paint boot splash: rendered before the JS bundle loads and removed
         by the app once the first-screen data (tasks + runners) has resolved, so
         the UI appears in one shot instead of filling in piecemeal. */
      #boot {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 30px;
        font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB',
          'Microsoft YaHei', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        transition: opacity 0.3s ease;
      }
      #boot.hide {
        opacity: 0;
        pointer-events: none;
      }
      #boot .boot-brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      #boot .boot-logo {
        font-size: 44px;
        line-height: 1;
      }
      #boot .boot-name {
        font-size: 30px;
        font-weight: 600;
        letter-spacing: 0.3px;
        color: #1f2329;
      }
      #boot .boot-progress {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      #boot .boot-bar {
        width: 320px;
        height: 6px;
        border-radius: 999px;
        background: #f2f3f5;
        overflow: hidden;
      }
      #boot .boot-fill {
        height: 100%;
        width: 8%;
        border-radius: 999px;
        background: linear-gradient(90deg, #5b8bff, #3370ff);
        transition: width 0.3s ease;
      }
      #boot .boot-cap {
        font-size: 13px;
        color: #8f959e;
      }
      /* Boot splash renders before index.css loads, so its dark variant lives
         here, keyed off the data-theme set by the inline script above. */
      html[data-theme='dark'] #boot {
        background: #16171a;
      }
      html[data-theme='dark'] #boot .boot-name {
        color: #e6e8eb;
      }
      html[data-theme='dark'] #boot .boot-bar {
        background: #26282d;
      }
      html[data-theme='dark'] #boot .boot-cap {
        color: #8b9097;
      }
    </style>
  </head>
  <body>
    <div id="boot">
      <div class="boot-brand">
        <span class="boot-logo"><svg width="44" height="44" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="og-boot" x1="14" y1="12" x2="50" y2="54" gradientUnits="userSpaceOnUse"><stop stop-color="#5b8bff"/><stop offset="1" stop-color="#3370ff"/></linearGradient></defs><g transform="rotate(-26 32 32)"><ellipse cx="32" cy="32" rx="28" ry="12.5" stroke="url(#og-boot)" stroke-width="3.4" opacity="0.6"/><circle cx="56" cy="25.6" r="5.4" fill="url(#og-boot)"/></g><rect x="19" y="20" width="26" height="24" rx="6" fill="url(#og-boot)"/><path d="M25 27.5 L30 32 L25 36.5" stroke="#fff" stroke-width="2.9" stroke-linecap="round" stroke-linejoin="round"/><line x1="33" y1="35.8" x2="39.5" y2="35.8" stroke="#fff" stroke-width="2.9" stroke-linecap="round"/></svg></span>
        <span class="boot-name">Orbit</span>
      </div>
      <div class="boot-progress">
        <div class="boot-bar"><div id="boot-fill" class="boot-fill"></div></div>
        <div class="boot-cap">Loading your workspace…</div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      // Determinate progress: the bar only ever moves forward as the app reports
      // real milestones via window.__bootProgress(pct); window.__bootDone() snaps
      // it to 100% and fades the splash out.
      (function () {
        var fill = document.getElementById('boot-fill');
        var shown = 8;
        var set = function (pct) {
          if (pct > shown) shown = pct; // monotonic — never step backwards
          fill.style.width = shown + '%';
        };
        window.__bootProgress = set;
        window.__bootDone = function () {
          set(100);
          var boot = document.getElementById('boot');
          if (!boot) return;
          boot.classList.add('hide');
          setTimeout(function () {
            boot.remove();
          }, 320);
        };
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
