services:
  postgres:
    image: postgres:16-alpine
    container_name: orbit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: orbit
      POSTGRES_PASSWORD: orbit
      POSTGRES_DB: orbit
    expose:
      - "5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbit -d orbit"]
      interval: 5s
      timeout: 5s
      retries: 10

  apiserver:
    build:
      context: .
      dockerfile: src/apiserver/Dockerfile
    container_name: orbit-apiserver
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://orbit:orbit@postgres:5432/orbit?schema=public"
      JWT_SECRET: "${JWT_SECRET:?set JWT_SECRET (generate: openssl rand -base64 32)}"
      PORT: "3000"
      CORS_ORIGINS: "http://localhost:2086"
      # Optional: DeepSeek (OpenAI-compatible) for clean English session titles + worktree
      # branch slugs. Unset → a deterministic slug fallback, no LLM call (see naming.ts).
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      DEEPSEEK_BASE_URL: "${DEEPSEEK_BASE_URL:-https://api.deepseek.com}"
      DEEPSEEK_MODEL: "${DEEPSEEK_MODEL:-deepseek-chat}"
      # Optional: APNs push for the iOS client ("needs your reply" alerts). Unset → PushService is
      # a no-op (no pushes). APNS_KEY is the base64 of the AuthKey_XXXX.p8 auth key.
      APNS_KEY: "${APNS_KEY:-}"
      APNS_KEY_ID: "${APNS_KEY_ID:-}"
      APNS_TEAM_ID: "${APNS_TEAM_ID:-}"
      APNS_BUNDLE_ID: "${APNS_BUNDLE_ID:-io.orbitd.app}"
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      # Any HTTP response means Nest is up; only a refused connection fails.
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api').then(()=>process.exit(0)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: src/web/Dockerfile
      args:
        # Public origin the install commands point at; baked into the bundle at build time.
        # Defaults to the local gateway — set PUBLIC_ORIGIN in .env when serving on a domain.
        PUBLIC_ORIGIN: "${PUBLIC_ORIGIN:-http://localhost:2086}"
    container_name: orbit-web
    restart: unless-stopped
    depends_on:
      apiserver:
        condition: service_healthy
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/healthz"]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 10s

  gateway:
    image: nginx:alpine
    container_name: orbit-gateway
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      apiserver:
        condition: service_healthy
    ports:
      - "2086:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/healthz"]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 10s
