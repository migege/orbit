# Release workflow for the native iOS client: archives, signs and uploads a build to TestFlight.
# The counterpart to ios-client.yml (which only build/tests) — same relationship as
# macos-release.yml vs macos-client.yml.
#
# Signing + upload use an App Store Connect API key (.p8): `-allowProvisioningUpdates` lets Xcode
# create/download the distribution certificate + App Store provisioning profile on the runner, and
# `ExportOptions.plist`'s `destination = upload` pushes the .ipa to App Store Connect. No manual
# certificate/profile juggling and no fastlane.
#
# Trigger: workflow_dispatch, or pushing an `ios-v*` tag (kept distinct from the macOS `v*` tags so
# the two release workflows never fire on the same tag). The tag drives the marketing version
# (ios-v0.1.0 → 0.1.0); the build number is the commit count (monotonic, as TestFlight requires).
#
# One-time setup (see src/ios/README.md → Release):
#   • Create the app in App Store Connect with bundle id `io.orbitd.app`.
#   • Generate an App Store Connect API key (Users and Access → Integrations → App Store Connect
#     API) with the "Admin" role (App Manager can't create the distribution certificate).
# Required repo secrets (Settings → Secrets and variables → Actions):
#   ASC_KEY_ID          the API key's Key ID
#   ASC_ISSUER_ID       the Issuer ID shown above the key list
#   ASC_KEY_P8_BASE64   base64 of the downloaded AuthKey_XXXXXXXXXX.p8 file
#   APPLE_TEAM_ID       Developer Team ID (already used by macos-release.yml)
name: iOS release (TestFlight)

on:
  workflow_dispatch:
  push:
    tags: ["ios-v*"]

concurrency:
  group: ios-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  testflight:
    name: Archive + upload to TestFlight
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history → commit-count build number is monotonic
      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Toolchain
        run: xcodebuild -version && xcodegen --version

      - name: Write App Store Connect API key
        env:
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
          ASC_KEY_ID:        ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      - name: Generate Xcode project
        working-directory: src/ios
        run: xcodegen generate

      - name: Archive
        working-directory: src/ios
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_KEY_ID:    ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          MKT="0.1.0"
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then MKT="${GITHUB_REF_NAME#ios-v}"; fi
          BUILD="$(git rev-list --count HEAD)"
          echo "Building marketing $MKT (build $BUILD)"
          xcodebuild \
            -project Orbit.xcodeproj \
            -scheme Orbit \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/Orbit.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            MARKETING_VERSION="$MKT" \
            CURRENT_PROJECT_VERSION="$BUILD" \
            archive

      - name: Export + upload to TestFlight
        working-directory: src/ios
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_KEY_ID:    ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          sed "s/REPLACE_WITH_TEAM_ID/${APPLE_TEAM_ID}/" ExportOptions.plist > "$RUNNER_TEMP/ExportOptions.plist"
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Orbit.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"
