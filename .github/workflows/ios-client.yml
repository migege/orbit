# CI for the native iOS client (src/ios). The iOS app reuses the macOS shell's shared SwiftUI
# sources in place (Structure B) and links OrbitKit, so it also builds when those change.
#
#   • orbitkit-linux — the pure OrbitKit protocol/logic core on Linux (fast, platform-agnostic).
#   • ios — the FIRST real compile of the iOS app: generate the Xcode project with XcodeGen, then
#     `xcodebuild` it for an iOS Simulator (no code signing). This is where iOS-only SDK nits in
#     the shared SwiftUI surface out. It does NOT produce a signed .ipa/TestFlight build — that
#     needs signing + App Store Connect (Phase F, a separate ios-release workflow).
#
# When each runs (macOS runners bill at 10×, so the expensive job is PR-only):
#   • branch push  → orbitkit-linux only
#   • pull request → + ios (the 10×-billed macOS/Xcode compile)
name: iOS client

on:
  push:
    branches: ["**"]
    paths:
      - "src/ios/**"
      - "src/macos/OrbitApp/**"
      - "src/macos/OrbitKit/**"
      - ".github/workflows/ios-client.yml"
  pull_request:
    paths:
      - "src/ios/**"
      - "src/macos/OrbitApp/**"
      - "src/macos/OrbitKit/**"
      - ".github/workflows/ios-client.yml"
  # Manual trigger so the Mac build can be run on demand (e.g. `gh workflow run ios-client.yml
  # --ref <branch>`) to verify a phase without opening a throwaway PR.
  workflow_dispatch:

concurrency:
  group: ios-client-${{ github.ref }}
  cancel-in-progress: true

jobs:
  orbitkit-linux:
    name: OrbitKit (Linux · swift test)
    runs-on: ubuntu-latest
    container: swift:6.1
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Test OrbitKit
        working-directory: src/macos/OrbitKit
        run: swift test

  ios:
    name: iOS (generate + build)
    # macOS runners bill at 10× — only burn them on PRs or an explicit manual dispatch,
    # not on every branch push.
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Toolchain
        run: swift --version && xcodebuild -version && xcodegen --version
      - name: Generate Xcode project
        working-directory: src/ios
        run: xcodegen generate
      # First real compile of the iOS app: shared SwiftUI views + @Observable models + OrbitKit,
      # built for the simulator so no signing is needed. Surfaces any iOS-availability nits.
      - name: Build for iOS Simulator
        working-directory: src/ios
        run: |
          xcodebuild \
            -project Orbit.xcodeproj \
            -scheme Orbit \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO \
            build
