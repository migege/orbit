# Orbit edge gateway — the single externally exposed entry point.
# All upstreams (web, apiserver, postgres) stay on the internal Docker
# network and are not published to the host; traffic reaches them only
# through this nginx.
server {
    listen 80;
    server_name _;

    # Re-resolve upstreams through Docker's embedded DNS at request time (the
    # `valid` TTL caps how long a stale IP is held). Paired with the variable
    # `proxy_pass` forms below, this is what makes a recreated web/apiserver
    # container's new IP get picked up automatically — without it nginx caches
    # the upstream IP from startup and 502s after the next deploy.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Liveness probe — answered by nginx directly, no upstream needed
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # SSE run-event stream carries the access_token in the query string (EventSource
    # can't set headers), so don't write it to the access log. Matched before the
    # /api/ prefix below. Proxy settings mirror /api/.
    location ~ ^/api/runs/[^/]+/events$ {
        access_log off;
        set $apiserver_sse apiserver:3000;
        proxy_pass http://$apiserver_sse$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    # REST + SSE → control plane (same-origin, so no CORS needed)
    location /api/ {
        # File/attachment uploads (multipart POST /api/attachments) run up to the 25MB
        # app cap; nginx's 1MB default would 413 them here before they reach the apiserver.
        # Headroom above 25MB lets the app return its precise error instead of a bare 413.
        client_max_body_size 30m;

        # Variable form forces per-request DNS resolution (see resolver above).
        # Do not collapse back to `proxy_pass http://apiserver:3000;` — that
        # pins the IP at startup and breaks after the upstream is recreated.
        set $apiserver apiserver:3000;
        proxy_pass http://$apiserver$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Server-Sent Events: stream immediately, keep the connection long-lived
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    # Everything else → static SPA served by the web container
    location / {
        # Variable form forces per-request DNS resolution (see resolver above).
        set $web web:80;
        proxy_pass http://$web$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
