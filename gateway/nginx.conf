# Orbit edge gateway — the single externally exposed entry point.
# All upstreams (web, apiserver, postgres) stay on the internal Docker
# network and are not published to the host; traffic reaches them only
# through this nginx.
server {
    listen 80;
    server_name _;

    # Liveness probe — answered by nginx directly, no upstream needed
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # REST + SSE → control plane (same-origin, so no CORS needed)
    location /api/ {
        proxy_pass http://apiserver:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Server-Sent Events: stream immediately, keep the connection long-lived
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    # Everything else → static SPA served by the web container
    location / {
        proxy_pass http://web:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
